<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TypeForge — Typing Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --text: #e2e2f0;
      --muted: #4a4a6a;
      --accent: #f5c842;
      --accent2: #e85d75;
      --correct: #4ade9a;
      --wrong: #f5536a;
      --caret: #f5c842;
      --highlight: rgba(245,200,66,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 20px 60px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(245,200,66,0.06) 0%, transparent 70%);
      top: -100px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 820px;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .mode-selector {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .mode-btn:hover { color: var(--text); border-color: var(--muted); }
    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .stat-card.live::after { transform: scaleX(1); }

    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      transition: color 0.2s;
    }

    .stat-unit {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
    }

    #wpm-value { color: var(--accent); }
    #acc-value { color: var(--correct); }

    .timer-wrap {
      position: relative;
      width: 56px; height: 56px;
    }

    .timer-wrap svg {
      transform: rotate(-90deg);
    }

    .timer-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
    }

    .timer-arc {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .typing-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 36px;
      margin-bottom: 28px;
      position: relative;
      cursor: text;
      transition: border-color 0.2s;
    }

    .typing-section.focused { border-color: rgba(245,200,66,0.3); }

    .focus-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.85);
      border-radius: 14px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      backdrop-filter: blur(4px);
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .focus-hint.hidden { opacity: 0; }

    #words-display {
      font-family: 'Space Mono', monospace;
      font-size: 1.15rem;
      line-height: 2.2;
      letter-spacing: 0.03em;
      color: var(--muted);
      user-select: none;
      min-height: 140px;
      position: relative;
    }

    .word { display: inline; }

    .char { position: relative; transition: color 0.05s; }
    .char.correct { color: var(--correct); }
    .char.wrong { color: var(--wrong); text-decoration: underline; text-decoration-color: var(--wrong); }
    .char.pending { color: var(--muted); }

    .caret {
      display: inline-block;
      width: 2px;
      height: 1.15em;
      background: var(--caret);
      border-radius: 1px;
      vertical-align: text-bottom;
      margin-right: -2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .extra { color: var(--wrong); opacity: 0.7; }

    #hidden-input {
      position: absolute;
      opacity: 0;
      width: 1px; height: 1px;
      pointer-events: none;
      top: 0; left: 0;
      font-size: 16px; 
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .btn-restart {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .btn-restart:hover {
      color: var(--text);
      border-color: var(--accent);
      background: var(--highlight);
    }

    .btn-restart svg { width: 14px; height: 14px; }

    #results-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #results-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 56px;
      text-align: center;
      min-width: 480px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    #results-overlay.show .results-card { transform: translateY(0); }

    .results-title {
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .results-wpm {
      font-size: 5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .results-wpm-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 36px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .res-stat { }
    .res-stat-val {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .res-stat-val.green { color: var(--correct); }
    .res-stat-val.red { color: var(--wrong); }
    .res-stat-lbl {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .sparkline-wrap {
      margin: 0 0 36px;
    }

    .sparkline-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: left;
    }

    #sparkline {
      width: 100%;
      height: 60px;
    }

    .btn-retry {
      background: var(--accent);
      border: none;
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 12px 36px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }

    .btn-retry:hover { background: #ffd760; transform: translateY(-1px); }

    .kbd-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
    }

    kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    .live-graph {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 28px;
    }

    .live-graph-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #live-graph-canvas {
      width: 100%;
      height: 50px;
      display: block;
    }

    @media (max-width: 640px) {
      body { padding: 0 14px 40px; }
      header { padding: 20px 0 16px; margin-bottom: 16px; }
      .logo { font-size: 1.1rem; }

      .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; transition: all 0.3s ease; }
      .stat-card { padding: 10px 14px; }
      .stat-value { font-size: 1.5rem; }
      #words-display { font-size: 1rem; line-height: 2; min-height: 100px; }
      .typing-section { padding: 20px 18px; margin-bottom: 14px; }
      .focus-hint { font-size: 0.75rem; }

      body.keyboard-open header { display: none; }
      body.keyboard-open .stats-bar { grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
      body.keyboard-open .stat-card { padding: 6px 8px; }
      body.keyboard-open .stat-value { font-size: 1.1rem; }
      body.keyboard-open .stat-label { display: none; }
      body.keyboard-open .stat-unit { display: none; }
      body.keyboard-open #streak-card { display: none; }
      body.keyboard-open .live-graph { display: none !important; }
      body.keyboard-open .controls { display: none; }
      body.keyboard-open .kbd-hint { display: none; }

      #results-overlay { align-items: flex-end; background: rgba(10,10,15,0.7); }
      .results-card {
        min-width: 100vw; width: 100vw;
        border-radius: 24px 24px 0 0;
        padding: 12px 24px 44px;
        border-bottom: none;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      }
      #results-overlay.show .results-card { transform: translateY(0); }
      .results-card::before {
        content: ''; display: block;
        width: 40px; height: 4px;
        background: var(--border); border-radius: 2px;
        margin: 0 auto 18px;
      }
      .results-title { margin-bottom: 14px; font-size: 0.6rem; }
      .results-wpm { font-size: 3.6rem; margin-bottom: 2px; }
      .results-wpm-label { margin-bottom: 18px; }
      .results-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
      .res-stat-val { font-size: 1.4rem; }
      .sparkline-wrap { margin-bottom: 18px; }
      .btn-retry { width: 100%; padding: 16px; font-size: 0.9rem; border-radius: 12px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Type<span>Forge</span></div>
    <div class="mode-selector">
      <button class="mode-btn active" data-time="30">30s</button>
      <button class="mode-btn" data-time="60">60s</button>
      <button class="mode-btn" data-time="120">120s</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card" id="wpm-card">
      <div class="stat-label">WPM</div>
      <div class="stat-value" id="wpm-value">0</div>
      <div class="stat-unit">words / min</div>
    </div>
    <div class="stat-card" id="acc-card">
      <div class="stat-label">Accuracy</div>
      <div class="stat-value" id="acc-value">—</div>
      <div class="stat-unit">percent</div>
    </div>
    <div class="stat-card" id="streak-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="streak-value">0</div>
      <div class="stat-unit">correct chars</div>
    </div>
    <div class="stat-card" style="display:flex;align-items:center;gap:14px;padding:12px 20px;">
      <div class="timer-wrap">
        <svg viewBox="0 0 56 56" width="56" height="56">
          <circle class="timer-track" cx="28" cy="28" r="24"/>
          <circle class="timer-arc" id="timer-arc" cx="28" cy="28" r="24"
            stroke-dasharray="150.796"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timer-display">30</div>
      </div>
      <div>
        <div class="stat-label">Time</div>
        <div class="stat-unit" id="timer-sub">remaining</div>
      </div>
    </div>
  </div>

  <div class="live-graph" id="live-graph-wrap" style="display:none;">
    <div class="live-graph-label">Live WPM</div>
    <canvas id="live-graph-canvas" height="50"></canvas>
  </div>

  <div class="typing-section" id="typing-section">
    <div class="focus-hint" id="focus-hint">Click here or press any key to begin</div>
    <div id="words-display"></div>
    <input id="hidden-input"
      type="text"
      inputmode="text"
      autocomplete="new-password"
      autocorrect="off"
      autocapitalize="none"
      autocomplete="off"
      spellcheck="false"
      data-gramm="false"
      data-gramm_editor="false"
      data-enable-grammarly="false"
      enterkeyhint="next"
      aria-label="Type here"/>
  </div>

  <div class="controls">
    <button class="btn-restart" id="restart-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Restart
    </button>
  </div>

  <div class="kbd-hint">
    <kbd>Tab</kbd> + <kbd>Enter</kbd> to restart &nbsp;·&nbsp; <kbd>Esc</kbd> to reset
  </div>

</div>

<div id="results-overlay">
  <div class="results-card">
    <div class="results-title">✦ Test Complete ✦</div>
    <div class="results-wpm" id="res-wpm">0</div>
    <div class="results-wpm-label">WORDS PER MINUTE</div>
    <div class="results-grid">
      <div class="res-stat">
        <div class="res-stat-val green" id="res-acc">0%</div>
        <div class="res-stat-lbl">Accuracy</div>
      </div>
      <div class="res-stat">
        <div class="res-stat-val" id="res-correct">0</div>
        <div class="res-stat-lbl">Correct</div>
      </div>
      <div class="res-stat">
        <div class="res-stat-val red" id="res-errors">0</div>
        <div class="res-stat-lbl">Errors</div>
      </div>
    </div>
    <div class="sparkline-wrap">
      <div class="sparkline-label">WPM over time</div>
      <svg id="sparkline" viewBox="0 0 400 60" preserveAspectRatio="none">
        <defs>
          <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f5c842" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path id="spark-area" fill="url(#spark-grad)" d=""/>
        <path id="spark-line" fill="none" stroke="#f5c842" stroke-width="2" d=""/>
      </svg>
    </div>
    <button class="btn-retry" id="retry-btn">Try Again</button>
  </div>
</div>

<script>
const wordBank = [
  "the","be","to","of","and","a","in","that","have","it","for","not","on","with",
  "he","as","you","do","at","this","but","his","by","from","they","we","say","her",
  "she","or","an","will","my","one","all","would","there","their","what","so","up",
  "out","if","about","who","get","which","go","me","when","make","can","like","time",
  "no","just","him","know","take","people","into","year","your","good","some","could",
  "them","see","other","than","then","now","look","only","come","its","over","think",
  "also","back","after","use","two","how","our","work","first","well","way","even",
  "new","want","because","any","these","give","day","most","us","great","between",
  "need","large","often","hand","high","place","hold","turn","help","start","city",
  "play","small","number","off","always","move","live","point","door","health","grow",
  "word","letter","open","seem","together","next","white","children","begin","got",
  "walk","example","ease","paper","group","always","music","those","both","mark",
  "book","carry","took","science","eat","room","friend","began","idea","fish","mountain",
  "stop","once","base","hear","horse","cut","sure","watch","color","face","wood",
  "main","enough","plain","girl","usual","young","ready","above","ever","red","list",
  "though","feel","talk","bird","soon","body","dog","family","direct","pose","leave",
  "song","measure","door","product","black","short","numeral","class","wind","question",
  "happen","complete","ship","area","half","rock","order","fire","south","problem"
];

let words = [];
let currentWordIdx = 0;
let currentInput = '';
let typedChars = 0;
let correctChars = 0;
let errorChars = 0;
let totalCorrect = 0;
let totalErrors = 0;
let streak = 0;
let maxStreak = 0;
let timerDuration = 30;
let timeLeft = 30;
let timerInterval = null;
let started = false;
let finished = false;
let wpmHistory = [];
let liveWpmData = [];
let focused = false;
let tabPressed = false;

const wordsDisplay = document.getElementById('words-display');
const hiddenInput = document.getElementById('hidden-input');
const wpmVal = document.getElementById('wpm-value');
const accVal = document.getElementById('acc-value');
const streakVal = document.getElementById('streak-value');
const timerDisplay = document.getElementById('timer-display');
const timerArc = document.getElementById('timer-arc');
const timerSub = document.getElementById('timer-sub');
const focusHint = document.getElementById('focus-hint');
const typingSection = document.getElementById('typing-section');
const resultsOverlay = document.getElementById('results-overlay');
const liveGraphWrap = document.getElementById('live-graph-wrap');
const liveCanvas = document.getElementById('live-graph-canvas');
const liveCtx = liveCanvas.getContext('2d');
const CIRC = 2 * Math.PI * 24;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateWords(count = 80) {
  const shuffled = shuffle(wordBank);
  const result = [];
  while (result.length < count) result.push(...shuffled);
  return result.slice(0, count);
}

function renderWords() {
  wordsDisplay.innerHTML = '';
  words.forEach((word, wi) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.id = `word-${wi}`;

    word.split('').forEach((ch, ci) => {
      const c = document.createElement('span');
      c.className = 'char pending';
      c.id = `char-${wi}-${ci}`;
      c.textContent = ch;
      span.appendChild(c);
    });

    if (wi < words.length - 1) {
      const space = document.createElement('span');
      space.textContent = ' ';
      span.appendChild(space);
    }

    wordsDisplay.appendChild(span);
  });
  updateCaret();
}

function updateCaret() {
  const old = document.getElementById('caret');
  if (old) old.remove();

  if (finished) return;

  const word = words[currentWordIdx];
  if (!word) return;

  const caretEl = document.createElement('span');
  caretEl.id = 'caret';
  caretEl.className = 'caret';

  const ci = currentInput.length;
  const charEl = document.getElementById(`char-${currentWordIdx}-${ci}`);
  if (charEl) {
    charEl.parentNode.insertBefore(caretEl, charEl);
  } else {
    const lastChar = document.getElementById(`char-${currentWordIdx}-${word.length - 1}`);
    if (lastChar && lastChar.nextSibling) {
      lastChar.parentNode.insertBefore(caretEl, lastChar.nextSibling);
    } else if (lastChar) {
      lastChar.parentNode.appendChild(caretEl);
    }
  }

  const wordEl = document.getElementById(`word-${currentWordIdx}`);
  if (wordEl) {
    wordEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function updateWordDisplay(wi, typed) {
  const word = words[wi];
  const wordEl = document.getElementById(`word-${wi}`);
  if (!wordEl) return;

  wordEl.querySelectorAll('.extra').forEach(e => e.remove());

  word.split('').forEach((ch, ci) => {
    const c = document.getElementById(`char-${wi}-${ci}`);
    if (!c) return;
    if (ci < typed.length) {
      c.className = 'char ' + (typed[ci] === ch ? 'correct' : 'wrong');
    } else {
      c.className = 'char pending';
    }
  });

  if (typed.length > word.length) {
    const extra = typed.slice(word.length);
    const space = wordEl.querySelector('span:last-child');
    extra.split('').forEach(ch => {
      const e = document.createElement('span');
      e.className = 'char extra';
      e.textContent = ch;
      if (space && space.textContent === ' ') {
        wordEl.insertBefore(e, space);
      } else {
        wordEl.appendChild(e);
      }
    });
  }
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    recordWPM();
    drawLiveGraph();
    if (timeLeft <= 0) endTest();
  }, 1000);
}

function updateTimerUI() {
  timerDisplay.textContent = timeLeft;
  const offset = CIRC - (timeLeft / timerDuration) * CIRC;
  timerArc.style.strokeDashoffset = offset;
  if (timeLeft <= 5) timerArc.style.stroke = 'var(--wrong)';
  else if (timeLeft <= 10) timerArc.style.stroke = '#f5a742';
  else timerArc.style.stroke = 'var(--accent)';
}

function recordWPM() {
  const elapsed = timerDuration - timeLeft;
  const wpm = elapsed > 0 ? Math.round((correctChars / 5) / (elapsed / 60)) : 0;
  liveWpmData.push(wpm);
}

function drawLiveGraph() {
  const w = liveCanvas.offsetWidth * window.devicePixelRatio || 400;
  const h = 50 * window.devicePixelRatio || 50;
  liveCanvas.width = w;
  liveCanvas.height = h;

  liveCtx.clearRect(0, 0, w, h);
  if (liveWpmData.length < 2) return;

  const max = Math.max(...liveWpmData, 10);
  const step = w / (liveWpmData.length - 1);

  liveCtx.beginPath();
  liveWpmData.forEach((v, i) => {
    const x = i * step;
    const y = h - (v / max) * (h * 0.85) - h * 0.05;
    i === 0 ? liveCtx.moveTo(x, y) : liveCtx.lineTo(x, y);
  });

  liveCtx.strokeStyle = 'rgba(245,200,66,0.8)';
  liveCtx.lineWidth = 2 * window.devicePixelRatio;
  liveCtx.lineJoin = 'round';
  liveCtx.stroke();
}

function calcWPM() {
  const elapsed = timerDuration - timeLeft;
  if (elapsed === 0) return 0;
  return Math.round((correctChars / 5) / (elapsed / 60));
}

function calcAccuracy() {
  const total = totalCorrect + totalErrors;
  if (total === 0) return '—';
  return Math.round((totalCorrect / total) * 100) + '%';
}

function updateStats() {
  const wpm = calcWPM();
  wpmVal.textContent = wpm;
  accVal.textContent = calcAccuracy();
  streakVal.textContent = streak;

  document.getElementById('wpm-card').classList.toggle('live', started && !finished);
  document.getElementById('acc-card').classList.toggle('live', started && !finished);
}

hiddenInput.addEventListener('keydown', handleKeydown);

let isComposing = false;
let lastCommittedValue = '';

function applyInputValue(rawVal){
  if(finished) return;

  var val = rawVal.split('\r').join('').split('\n').join(''); 

  if(val === lastCommittedValue) return;
  lastCommittedValue = val;

  if(!started && val.length>0){
    started = true;
    startTimer();
    focusHint.classList.add('hidden');
    liveGraphWrap.style.display = 'block';
    document.getElementById('wpm-card').classList.add('live');
  }

  if(val.indexOf(' ') !== -1){
    var typed = val.split(' ').join(' ');
    commitWord(typed);
    hiddenInput.value = '';
    lastCommittedValue = '';
    currentInput = '';
    return;
  }

  currentInput = val;
  updateWordDisplay(currentWordIdx, currentInput);
  updateCaret();
  updateStats();
}

hiddenInput.addEventListener('compositionstart', () => {
  isComposing = true;
});

hiddenInput.addEventListener('compositionend', () => {
  isComposing = false;
  applyInputValue(hiddenInput.value);
});

hiddenInput.addEventListener('input', (e) => {
  if (isComposing) return;
  if (e.inputType === 'insertCompositionText') return;
  applyInputValue(hiddenInput.value);
});

function handleKeydown(e) {
  if (e.key === 'Tab') {
    tabPressed = true;
    e.preventDefault();
    return;
  }
  if (tabPressed && e.key === 'Enter') {
    resetTest();
    tabPressed = false;
    return;
  }
  tabPressed = false;
  if (e.key === 'Escape') { resetTest(); return; }

}

function commitWord(typed) {
  const word = words[currentWordIdx];
  const minLen = Math.min(typed.length, word.length);

  for (let i = 0; i < minLen; i++) {
    if (typed[i] === word[i]) {
      correctChars++;
      totalCorrect++;
      streak++;
      if (streak > maxStreak) maxStreak = streak;
    } else {
      errorChars++;
      totalErrors++;
      streak = 0;
    }
  }
 
  if (typed.length > word.length) {
    const extra = typed.length - word.length;
    totalErrors += extra;
    streak = 0;
  }
 
  if (typed.length < word.length) {
    const missing = word.length - typed.length;
    totalErrors += missing;
    streak = 0; 
    correctChars += 0;  
  }
 
  correctChars++;  

  updateWordDisplay(currentWordIdx, typed);
  currentWordIdx++;
  currentInput = '';
 
  if (currentWordIdx >= words.length - 10) {
    const more = generateWords(40);
    words.push(...more);
    renderWords();
  }

  updateCaret();
  updateStats();
}

function endTest() {
  finished = true;
  clearInterval(timerInterval);
  timerInterval = null;
  hiddenInput.blur();
  timerDisplay.textContent = '0';
  timerSub.textContent = 'finished';

  const finalWPM = calcWPM();
  const accStr = calcAccuracy();

  document.getElementById('res-wpm').textContent = finalWPM;
  document.getElementById('res-acc').textContent = accStr;
  document.getElementById('res-correct').textContent = totalCorrect;
  document.getElementById('res-errors').textContent = totalErrors;

  drawSparkline();
  setTimeout(() => resultsOverlay.classList.add('show'), 400);
}

function drawSparkline() {
  const data = [...liveWpmData];
  if (data.length < 2) return;

  const W = 400, H = 60;
  const max = Math.max(...data, 10);
  const step = W / (data.length - 1);

  const pts = data.map((v, i) => [i * step, H - 4 - (v / max) * (H - 8)]);
  const line = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = `${line} L${pts[pts.length-1][0]},${H} L0,${H} Z`;

  document.getElementById('spark-line').setAttribute('d', line);
  document.getElementById('spark-area').setAttribute('d', area);
}

function resetTest() {
  clearInterval(timerInterval);
  timerInterval = null;
  started = false;
  finished = false;
  currentWordIdx = 0;
  currentInput = '';
  typedChars = 0;
  correctChars = 0;
  errorChars = 0;
  totalCorrect = 0;
  totalErrors = 0;
  streak = 0;
  maxStreak = 0;
  timeLeft = timerDuration;
  liveWpmData = [];

  timerDisplay.textContent = timerDuration;
  timerArc.style.strokeDashoffset = 0;
  timerArc.style.stroke = 'var(--accent)';
  timerSub.textContent = 'remaining';
  wpmVal.textContent = '0';
  accVal.textContent = '—';
  streakVal.textContent = '0';

  document.getElementById('wpm-card').classList.remove('live');
  document.getElementById('acc-card').classList.remove('live');

  liveGraphWrap.style.display = 'none';
  resultsOverlay.classList.remove('show');
  focusHint.classList.remove('hidden');

  words = generateWords(80);
  hiddenInput.value = '';
  renderWords();
}

typingSection.addEventListener('click', () => {
  hiddenInput.focus();
  focused = true;
  typingSection.classList.add('focused');
  focusHint.classList.add('hidden');
});

hiddenInput.addEventListener('focus', () => {
  focused = true;
  typingSection.classList.add('focused');
  if (!started) focusHint.classList.add('hidden');
});

hiddenInput.addEventListener('blur', () => {
  focused = false;
  typingSection.classList.remove('focused');
  if (!started) focusHint.classList.remove('hidden');
  document.body.classList.remove('keyboard-open');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') return;
  if (!focused && !finished) {
    hiddenInput.focus();
    typingSection.classList.add('focused');
  }
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timerDuration = parseInt(btn.dataset.time);
    resetTest();
  });
});

document.getElementById('restart-btn').addEventListener('click', resetTest);
document.getElementById('retry-btn').addEventListener('click', resetTest);

words = generateWords(80);
renderWords();


if (window.visualViewport) {
  let lastHeight = window.visualViewport.height;

  window.visualViewport.addEventListener('resize', () => {
    const currentHeight = window.visualViewport.height;
    const diff = lastHeight - currentHeight;
    const isMobile = window.innerWidth <= 640;

    if (isMobile) {
      if (diff > 100) {
        document.body.classList.add('keyboard-open');
        setTimeout(() => {
          typingSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 80);
      } else if (diff < -100) {
        document.body.classList.remove('keyboard-open');
      }
    }
    lastHeight = currentHeight;
  });
}
</script>
